openapi: 3.0.3
info:
  title: Comments API
  version: "1.0"
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /comments:
    get:
      summary: Get all comments
      parameters:
        - name: postId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: A list of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
    post:
      summary: Create a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewComment'
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        "400":
          description: Bad request — missing required fields
  /comments/{id}:
    get:
      summary: Get a comment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        "404":
          description: Comment not found
components:
  schemas:
    Comment:
      type: object
      required:
        - id
        - postId
        - name
        - email
        - body
      properties:
        id:
          type: integer
        postId:
          type: integer
        name:
          type: string
        email:
          type: string
        body:
          type: string
    NewComment:
      type: object
      required:
        - postId
        - name
        - email
        - body
      properties:
        postId:
          type: integer
        name:
          type: string
        email:
          type: string
        body:
          type: string
