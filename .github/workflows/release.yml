name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 0.1.10) — leave blank to use current version in gradle.properties"
        required: false
      next_version:
        description: "Next snapshot version (e.g. 0.1.11-SNAPSHOT) — leave blank to let the plugin auto-increment"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push commits + tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
          OSSRH_USERNAME:  ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD:  ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_FILE:     ${{ runner.temp }}/signing.key
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          CI: "true"
        run: |
          # Write the PGP key to a temp file if the secret is set
          if [ -n "${{ secrets.SIGNING_KEY_ASC }}" ]; then
            echo "${{ secrets.SIGNING_KEY_ASC }}" > "$SIGNING_KEY_FILE"
          fi

          RELEASE_ARGS="-Prelease.useAutomaticVersion=true"

          if [ -n "${{ inputs.release_version }}" ]; then
            RELEASE_ARGS="$RELEASE_ARGS -Prelease.releaseVersion=${{ inputs.release_version }}"
          fi

          if [ -n "${{ inputs.next_version }}" ]; then
            RELEASE_ARGS="$RELEASE_ARGS -Prelease.newVersion=${{ inputs.next_version }}"
          fi

          ./gradlew release $RELEASE_ARGS

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: plugin-idea/build/distributions/*.zip
          if-no-files-found: warn
